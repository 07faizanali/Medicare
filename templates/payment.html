{% extends 'base.html'%}
{% load static %}
{% block content %}

<!-- ========================= SECTION CONTENT ========================= -->
<section class="section-content padding-y">

    <!-- ============================ COMPONENT REGISTER   ================================= -->
        <div class="card mx-auto" style="max-width:520px; margin-top:40px;">
          <article class="card-body">
            <header class="mb-4"><h4 class="card-title">Make Payment</h4></header>
            <form>
                    <div class="form-row">
                        <div class="col form-group">
                            <label>Product_Id :</label>
                              <input type="text" class="form-control" placeholder="">
                        </div> <!-- form-group end.// -->
                        <div class="col form-group">
                            <label>Amount :</label>
                              <input type="text" class="form-control" placeholder="">
                        </div> <!-- form-group end.// -->
                    </div> <!-- form-row end.// -->
                    <div class="form-group">
                        <label>Email :</label>
                        <input type="email" class="form-control" placeholder="">
                        <small class="form-text text-muted">We'll never share your address with anyone else.</small>
                    </div> <!-- form-group end.// -->
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <lable>Pay Mode :</lable>&nbsp &nbsp
                             <strong style="color:#5CDB95;">
                             <input type="radio" value="Credit" name="paymode" required="required"> Credit
                             <input type="radio" value="Debit" name="paymode" required="required"> Debit
                             </strong>
                       </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                          <label>Card No :</label>
                          <input type="text" class="form-control" required>
                        </div> <!-- form-group end.// -->
                        <div class="form-group col-md-6">
                          <label>C V V :</label>
                          <input type="password" class="form-control" required>
                        </div> <!-- form-group end.// -->
                    </div> <!-- form-row.// -->
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label>Expire Month :</label>
                            <select  name="month"class="input-type" required="required" />
                            <option disabled selected value="" >Select</option>
                               <option>Jan</option>
                               <option>Feb</option>
                               <option>Mar</option>
                               <option>Apr</option>
                               <option>May</option>
                               <option>Jun</option>
                               <option>Jul</option>
                               <option>Aug</option>
                               <option>Sep</option>
                               <option>Oct</option>
                               <option>Nov</option>
                               <option>Dec</option>
                            </select><br><br>
                        </div> <!-- form-group end.// --> 
                        <div class="form-group col-md-6">
                            <label>Expire Year :</label>
                            <select  name="month"class="input-type" required="required" />
                            <option disabled selected value="" >Select</option>
                               <option>2021</option>
                               <option>2022</option>
                               <option>2023</option>
                               <option>2024</option>
                               <option>2025</option>
                               <option>2026</option>
                               <option>2027</option>
                               <option>2028</option>
                               <option>2029</option>
                               <option>2030</option>
                            </select><br><br>
                        </div> <!-- form-group end.// -->  
                    </div>
                    <div class="form-group">
                        <label>Card Holder Name :</label>
                        <input type="text" class="form-control" placeholder="" required>
                    </div> <!-- form-group end.// -->
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary btn-block"> Pay Now  </button>
                    </div> <!-- form-group// -->      
                        
                </form>
            </article><!-- card-body.// -->
        </div> <!-- card .// -->
        <!-- ============================ COMPONENT REGISTER  END.// ================================= -->
    
    
    </section>
    <!-- ========================= SECTION CONTENT END// ========================= -->
    

{% endblock %}
